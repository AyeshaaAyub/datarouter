syntax = "proto3";

option go_package = "github.com/AyeshaaAyub/datarouter/proto";

package storage;

message Data {
    map<string, bytes> fields = 1;
}

message StoreRequest {
    Data data = 1;
    string collection = 2;
}

message StoreResponse {
    string id = 1;
    string db_type = 2;
}

message RetrieveRequest {
    string id = 1;
    string collection = 2;
}

message RetrieveResponse {
    Data data = 1;
    string db_type = 2;
}

service StorageHandler {
    rpc Store(StoreRequest) returns (StoreResponse);
    rpc Retrieve(RetrieveRequest) returns (RetrieveResponse);
}
